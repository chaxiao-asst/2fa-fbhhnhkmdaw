<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2FA 验证码生成器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0f0d;
      --bg-secondary: #111916;
      --card: #151d19;
      --border: #243028;
      --fg: #e8f0eb;
      --muted: #6b8076;
      --accent: #00d47e;
      --accent-dim: #00a862;
      --danger: #ff4757;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
    }

    .font-mono {
      font-family: 'Space Mono', monospace;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 212, 126, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 126, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    .glow-orb {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 212, 126, 0.12) 0%, transparent 70%);
      filter: blur(60px);
      pointer-events: none;
      animation: orbFloat 8s ease-in-out infinite;
    }

    .glow-orb-1 {
      top: -200px;
      right: -100px;
    }

    .glow-orb-2 {
      bottom: -200px;
      left: -100px;
      animation-delay: -4s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, 30px) scale(1.1); }
    }

    .secret-input {
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--fg);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.1em;
      transition: all 0.3s ease;
    }

    .secret-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(0, 212, 126, 0.15);
    }

    .secret-input::placeholder {
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .code-display {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: all;
    }

    .progress-ring {
      transform: rotate(-90deg);
    }

    .progress-ring-circle {
      transition: stroke-dashoffset 0.5s linear;
      stroke-linecap: round;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: var(--bg);
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 212, 126, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--card);
      border: 2px solid var(--border);
      color: var(--fg);
      transition: all 0.3s ease;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      background: rgba(0, 212, 126, 0.1);
    }

    .main-card {
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
    }

    .copy-success {
      animation: copyPop 0.4s ease;
    }

    @keyframes copyPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }

    .timer-pulse {
      animation: timerPulse 1s ease-in-out infinite;
    }

    @keyframes timerPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <main class="relative z-10 min-h-screen flex items-center justify-center p-4 sm:p-6">
    <div class="w-full max-w-lg">
      
      <header class="text-center mb-8 fade-up">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-[var(--border)] bg-[var(--card)] mb-4">
          <svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <span class="text-sm font-medium text-[var(--muted)]">两步验证工具</span>
        </div>
        <h1 class="font-mono text-3xl sm:text-4xl font-bold tracking-tight mb-2">2FA Generator</h1>
        <p class="text-[var(--muted)]">输入密钥即可生成动态验证码</p>
      </header>

      <div class="main-card rounded-2xl p-6 sm:p-8 fade-up delay-1">
        
        <div class="mb-6">
          <label class="block text-sm font-medium text-[var(--muted)] mb-2">密钥 (Secret Key)</label>
          <div class="relative">
            <input 
              type="text" 
              id="secretInput" 
              class="secret-input w-full px-4 py-3 rounded-xl text-sm sm:text-base uppercase"
              placeholder="输入 Base32 密钥..."
              spellcheck="false"
              autocomplete="off"
            >
            <button 
              id="toggleVisibility"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-[var(--muted)] hover:text-[var(--fg)] transition-colors p-1"
              aria-label="切换密钥可见性"
            >
              <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <p id="secretError" class="text-[var(--danger)] text-sm mt-2 hidden">密钥格式无效，请检查后重试</p>
        </div>

        <button 
          id="generateBtn" 
          class="btn-primary w-full py-3 rounded-xl font-semibold text-base flex items-center justify-center gap-2"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          生成验证码
        </button>
      </div>

      <div id="codeCard" class="main-card rounded-2xl p-6 sm:p-8 mt-4 hidden fade-up delay-2">
        
        <div class="flex items-center justify-between mb-4">
          <span class="text-sm font-medium text-[var(--muted)]">当前验证码</span>
          <div class="flex items-center gap-2">
            <span id="timerText" class="font-mono text-sm text-[var(--accent)]">30s</span>
            <svg class="progress-ring w-8 h-8" viewBox="0 0 36 36">
              <circle 
                class="text-[var(--border)]" 
                stroke="currentColor" 
                stroke-width="3" 
                fill="transparent" 
                r="15" 
                cx="18" 
                cy="18"
              />
              <circle 
                id="progressCircle"
                class="progress-ring-circle text-[var(--accent)]" 
                stroke="currentColor" 
                stroke-width="3" 
                fill="transparent" 
                r="15" 
                cx="18" 
                cy="18"
                stroke-dasharray="94.247"
                stroke-dashoffset="0"
              />
            </svg>
          </div>
        </div>

        <div class="text-center py-4">
          <div id="codeDisplay" class="code-display">000 000</div>
        </div>

        <button 
          id="copyBtn" 
          class="btn-secondary w-full py-3 rounded-xl font-medium flex items-center justify-center gap-2"
        >
          <svg id="copyIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span id="copyText">复制验证码</span>
        </button>
      </div>

      <footer class="mt-8 text-center fade-up delay-2">
        <p class="text-xs text-[var(--muted)]">
          验证码每 30 秒自动刷新 · 页面刷新后数据将清除
        </p>
      </footer>
    </div>
  </main>

  <script>
    // State
    let currentSecret = '';
    let currentCode = '';
    let timerInterval = null;

    // DOM Elements
    const secretInput = document.getElementById('secretInput');
    const toggleVisibility = document.getElementById('toggleVisibility');
    const eyeIcon = document.getElementById('eyeIcon');
    const generateBtn = document.getElementById('generateBtn');
    const secretError = document.getElementById('secretError');
    const codeCard = document.getElementById('codeCard');
    const codeDisplay = document.getElementById('codeDisplay');
    const timerText = document.getElementById('timerText');
    const progressCircle = document.getElementById('progressCircle');
    const copyBtn = document.getElementById('copyBtn');
    const copyIcon = document.getElementById('copyIcon');
    const copyText = document.getElementById('copyText');

    // Base32 decode
    function base32Decode(str) {
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
      const cleanStr = str.toUpperCase().replace(/[^A-Z2-7]/g, '');
      
      if (cleanStr.length === 0) return null;
      
      let bits = '';
      for (let i = 0; i < cleanStr.length; i++) {
        const val = alphabet.indexOf(cleanStr[i]);
        if (val === -1) return null;
        bits += val.toString(2).padStart(5, '0');
      }
      
      const bytes = [];
      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.substr(i, 8), 2));
      }
      
      return new Uint8Array(bytes);
    }

    // HMAC-SHA1
    async function hmacSha1(key, message) {
      const cryptoKey = await crypto.subtle.importKey(
        'raw',
        key,
        { name: 'HMAC', hash: 'SHA-1' },
        false,
        ['sign']
      );
      
      const signature = await crypto.subtle.sign('HMAC', cryptoKey, message);
      return new Uint8Array(signature);
    }

    // Generate TOTP
    async function generateTOTP(secret) {
      const key = base32Decode(secret);
      if (!key) {
        throw new Error('Invalid secret key');
      }
      
      const time = Math.floor(Date.now() / 1000 / 30);
      const timeBuffer = new ArrayBuffer(8);
      const timeView = new DataView(timeBuffer);
      timeView.setUint32(4, time, false);
      
      const hmac = await hmacSha1(key, new Uint8Array(timeBuffer));
      
      const offset = hmac[hmac.length - 1] & 0x0f;
      const code = (
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff)
      ) % 1000000;
      
      return code.toString().padStart(6, '0');
    }

    // Format code with space
    function formatCode(code) {
      return code.substr(0, 3) + ' ' + code.substr(3);
    }

    // Update timer display
    function updateTimer() {
      const now = Date.now();
      const secondsRemaining = 30 - (Math.floor(now / 1000) % 30);
      const progress = secondsRemaining / 30;
      
      timerText.textContent = secondsRemaining + 's';
      
      const circumference = 94.247;
      const offset = circumference * (1 - progress);
      progressCircle.style.strokeDashoffset = offset;
      
      if (secondsRemaining <= 5) {
        progressCircle.classList.add('timer-pulse');
        progressCircle.style.stroke = 'var(--danger)';
        timerText.style.color = 'var(--danger)';
      } else {
        progressCircle.classList.remove('timer-pulse');
        progressCircle.style.stroke = 'var(--accent)';
        timerText.style.color = 'var(--accent)';
      }
      
      if (secondsRemaining === 30) {
        refreshCode();
      }
    }

    // Refresh code
    async function refreshCode() {
      if (!currentSecret) return;
      
      try {
        currentCode = await generateTOTP(currentSecret);
        codeDisplay.textContent = formatCode(currentCode);
      } catch (error) {
        console.error('Error refreshing code:', error);
      }
    }

    // Start generating
    async function startGenerating() {
      const secret = secretInput.value.trim().toUpperCase();
      
      if (!secret) {
        secretError.textContent = '请输入密钥';
        secretError.classList.remove('hidden');
        return;
      }
      
      try {
        currentCode = await generateTOTP(secret);
        currentSecret = secret;
        
        codeCard.classList.remove('hidden');
        secretError.classList.add('hidden');
        
        codeDisplay.textContent = formatCode(currentCode);
        
        if (timerInterval) clearInterval(timerInterval);
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
        
      } catch (error) {
        secretError.textContent = '密钥格式无效，请检查后重试';
        secretError.classList.remove('hidden');
        codeCard.classList.add('hidden');
      }
    }

    // Copy code
    async function copyCode() {
      if (!currentCode) return;
      
      try {
        await navigator.clipboard.writeText(currentCode);
        
        copyBtn.classList.add('copy-success');
        copyText.textContent = '已复制';
        copyIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>';
        
        setTimeout(() => {
          copyText.textContent = '复制验证码';
          copyIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>';
          copyBtn.classList.remove('copy-success');
        }, 1500);
        
      } catch (error) {
        console.error('Failed to copy:', error);
      }
    }

    // Event listeners
    generateBtn.addEventListener('click', startGenerating);
    
    secretInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        startGenerating();
      }
    });
    
    copyBtn.addEventListener('click', copyCode);
    
    let isVisible = true;
    toggleVisibility.addEventListener('click', () => {
      isVisible = !isVisible;
      secretInput.type = isVisible ? 'text' : 'password';
      eyeIcon.innerHTML = isVisible 
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
    });

    secretInput.addEventListener('input', () => {
      secretError.classList.add('hidden');
    });
  </script>
</body>
</html>
