<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2FA 验证码生成器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* 基础变量 - 深色模式 */
    :root {
      --bg: #0a0f0d;
      --bg-secondary: #111916;
      --card: #151d19;
      --card-hover: #1a2520;
      --border: #243028;
      --border-hover: #304038;
      --fg: #e8f0eb;
      --muted: #6b8076;
      --accent: #00d47e;
      --accent-dim: #00a862;
      --accent-glow: rgba(0, 212, 126, 0.3);
      --danger: #ff4757;
      --danger-glow: rgba(255, 71, 87, 0.3);
      --shadow: rgba(0, 0, 0, 0.2);
      --shadow-lg: rgba(0, 0, 0, 0.3);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --radius-sm: 0.5rem;
      --radius-md: 1rem;
      --radius-lg: 1.5rem;
      --radius-full: 9999px;
    }

    /* 浅色模式变量 */
    .light-mode {
      --bg: #f8faf9;
      --bg-secondary: #ffffff;
      --card: #ffffff;
      --card-hover: #f5f8f7;
      --border: #e1e8e4;
      --border-hover: #c8d8d0;
      --fg: #151d19;
      --muted: #8a9990;
      --accent: #00b86b;
      --accent-dim: #009458;
      --accent-glow: rgba(0, 184, 107, 0.3);
      --danger: #ff3747;
      --danger-glow: rgba(255, 55, 71, 0.3);
      --shadow: rgba(0, 0, 0, 0.08);
      --shadow-lg: rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      transition: var(--transition);
      line-height: 1.5;
    }

    .font-mono {
      font-family: 'Space Mono', monospace;
    }

    /* 网格背景动画 - 优化动画流畅度 */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 212, 126, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 126, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 25s linear infinite;
      pointer-events: none;
      transition: var(--transition);
      z-index: 0;
    }

    .light-mode .bg-grid {
      background-image: 
        linear-gradient(rgba(0, 184, 107, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 184, 107, 0.05) 1px, transparent 1px);
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(60px, 60px); }
    }

    /* 光晕球体 - 优化渐变和动画 */
    .glow-orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 212, 126, 0.15) 0%, transparent 70%);
      filter: blur(80px);
      pointer-events: none;
      animation: orbFloat 10s ease-in-out infinite;
      transition: var(--transition);
      z-index: 0;
    }

    .light-mode .glow-orb {
      background: radial-gradient(circle, rgba(0, 184, 107, 0.1) 0%, transparent 70%);
    }

    .glow-orb-1 {
      top: -250px;
      right: -150px;
    }

    .glow-orb-2 {
      bottom: -250px;
      left: -150px;
      animation-delay: -5s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-40px, 40px) scale(1.05); }
    }

    /* 模式切换按钮 - 增强视觉效果 */
    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
      background: var(--card);
      border: 1px solid var(--border);
      width: 48px;
      height: 48px;
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 6px 16px var(--shadow);
      backdrop-filter: blur(8px);
    }

    .theme-toggle:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 20px var(--shadow-lg);
      border-color: var(--accent);
    }

    .theme-toggle:active {
      transform: translateY(-1px) scale(1.02);
    }

    .theme-toggle svg {
      width: 22px;
      height: 22px;
      color: var(--muted);
      transition: var(--transition);
    }

    .theme-toggle:hover svg {
      color: var(--accent);
      transform: rotate(15deg);
    }

    /* 输入框样式 - 增强视觉层次 */
    .secret-input {
      background: var(--bg);
      border: 2px solid var(--border);
      color: var(--fg);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.1em;
      transition: var(--transition);
      box-shadow: 0 4px 12px var(--shadow);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      width: 100%;
      font-size: 1rem;
    }

    .secret-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow), 0 4px 16px var(--shadow);
      transform: translateY(-1px);
    }

    .light-mode .secret-input:focus {
      box-shadow: 0 0 0 4px var(--accent-glow), 0 4px 16px var(--shadow);
    }

    .secret-input::placeholder {
      color: var(--muted);
      letter-spacing: 0.05em;
      opacity: 0.8;
    }

    /* 验证码显示 - 增强渐变和视觉效果 */
    .code-display {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2.8rem, 9vw, 4.5rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: all;
      transition: var(--transition);
      position: relative;
      padding: 0.5rem 0;
    }

    .code-display::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    /* 进度环 - 优化视觉效果 */
    .progress-ring {
      transform: rotate(-90deg);
      width: 32px;
      height: 32px;
    }

    .progress-ring-circle {
      transition: stroke-dashoffset 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      stroke-linecap: round;
    }

    /* 按钮样式 - 全面优化 */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      color: var(--bg);
      font-weight: 600;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0, 212, 126, 0.25);
      border-radius: var(--radius-md);
      padding: 1rem;
      width: 100%;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .light-mode .btn-primary {
      box-shadow: 0 6px 18px rgba(0, 184, 107, 0.25);
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.2) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .btn-primary:hover::before {
      opacity: 1;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 212, 126, 0.35);
    }

    .light-mode .btn-primary:hover {
      box-shadow: 0 10px 25px rgba(0, 184, 107, 0.35);
    }

    .btn-primary:active {
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--card);
      border: 2px solid var(--border);
      color: var(--fg);
      transition: var(--transition);
      box-shadow: 0 4px 12px var(--shadow);
      border-radius: var(--radius-md);
      padding: 1rem;
      width: 100%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-weight: 500;
    }

    .btn-secondary:hover {
      border-color: var(--accent);
      background: var(--card-hover);
      transform: translateY(-3px);
      box-shadow: 0 6px 16px var(--shadow-lg);
    }

    .light-mode .btn-secondary:hover {
      background: var(--card-hover);
    }

    .btn-secondary:active {
      transform: translateY(-1px);
    }

    /* 卡片样式 - 增强质感 */
    .main-card {
      background: var(--card);
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      box-shadow: 0 10px 40px var(--shadow);
      transition: var(--transition);
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .main-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }

    .main-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 12px 45px var(--shadow-lg);
      transform: translateY(-2px);
    }

    /* 动画效果 - 优化 */
    .copy-success {
      animation: copyPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes copyPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .delay-1 { animation-delay: 0.15s; }
    .delay-2 { animation-delay: 0.3s; }

    .timer-pulse {
      animation: timerPulse 1.2s ease-in-out infinite;
    }

    @keyframes timerPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    /* 滚动条样式 - 优化 */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
      border-radius: var(--radius-sm);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: var(--radius-sm);
      border: 2px solid var(--bg);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    /* 头部标签样式优化 */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    /* 错误提示样式优化 */
    .error-text {
      color: var(--danger);
      font-size: 0.875rem;
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      transform: translateY(5px);
      transition: var(--transition);
    }

    .error-text:not(.hidden) {
      opacity: 1;
      transform: translateY(0);
    }

    /* 标题样式优化 */
    .page-title {
      font-family: 'Space Mono', monospace;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, var(--fg) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: 1rem;
      max-width: 80%;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* 页脚样式优化 */
    .page-footer {
      margin-top: 2rem;
      color: var(--muted);
      font-size: 0.875rem;
      text-align: center;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      opacity: 0.8;
    }

    /* 复制提示弹层 */
    .copy-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-md);
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px var(--shadow-lg);
      color: var(--fg);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .copy-toast.show {
      opacity: 1;
      top: 30px;
    }

    /* 减少动画偏好 */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* 响应式优化 */
    @media (max-width: 640px) {
      .main-card {
        padding: 1.5rem;
      }
      
      .theme-toggle {
        width: 44px;
        height: 44px;
        top: 16px;
        right: 16px;
      }
      
      .code-display {
        font-size: clamp(2rem, 8vw, 3.5rem);
        letter-spacing: 0.15em;
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>
  <!-- 复制提示弹层 -->
  <div class="copy-toast" id="copyToast">
    <svg class="w-5 h-5 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
    </svg>
    <span id="toastText">验证码已复制</span>
  </div>
  
  <!-- 主题切换按钮 -->
  <button id="themeToggle" class="theme-toggle" aria-label="切换明暗模式">
    <svg id="themeIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
  </button>

  <main class="relative z-10 min-h-screen flex items-center justify-center p-4 sm:p-6 md:p-8">
    <div class="w-full max-w-lg">
      
      <header class="text-center mb-8 fade-up">
        <div class="badge">
          <svg class="w-4 h-4 text-[var(--accent)]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <span>两步验证工具</span>
        </div>
        <h1 class="page-title">2FA Generator</h1>
        <p class="page-subtitle">输入 Base32 格式的密钥，即可生成 30 秒有效期的动态验证码</p>
      </header>

      <div class="main-card fade-up delay-1 mb-4">
        
        <div class="mb-6">
          <label class="block text-sm font-medium text-[var(--muted)] mb-2">密钥 (Secret Key)</label>
          <div class="relative">
            <input 
              type="text" 
              id="secretInput" 
              class="secret-input"
              placeholder="输入 Base32 密钥..."
              spellcheck="false"
              autocomplete="off"
            >
            <button 
              id="toggleVisibility"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-[var(--muted)] hover:text-[var(--fg)] transition-colors p-1"
              aria-label="切换密钥可见性"
            >
              <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
          <p id="secretError" class="error-text hidden">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            密钥格式无效，请检查后重试
          </p>
        </div>

        <button 
          id="generateBtn" 
          class="btn-primary"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          生成验证码
        </button>
      </div>

      <div id="codeCard" class="main-card fade-up delay-2 hidden">
        
        <div class="flex items-center justify-between mb-6">
          <span class="text-sm font-medium text-[var(--muted)]">当前验证码</span>
          <div class="flex items-center gap-2">
            <span id="timerText" class="font-mono text-sm text-[var(--accent)]">30s</span>
            <svg class="progress-ring" viewBox="0 0 36 36">
              <circle 
                class="text-[var(--border)]" 
                stroke="currentColor" 
                stroke-width="3" 
                fill="transparent" 
                r="15" 
                cx="18" 
                cy="18"
              />
              <circle 
                id="progressCircle"
                class="progress-ring-circle text-[var(--accent)]" 
                stroke="currentColor" 
                stroke-width="3" 
                fill="transparent" 
                r="15" 
                cx="18" 
                cy="18"
                stroke-dasharray="94.247"
                stroke-dashoffset="0"
              />
            </svg>
          </div>
        </div>

        <div class="text-center py-6">
          <div id="codeDisplay" class="code-display">000 000</div>
          <!-- 隐藏的文本节点，用于兼容复制 -->
          <span id="copyCodeText" style="position: absolute; opacity: 0; pointer-events: none;"></span>
        </div>

        <button 
          id="copyBtn" 
          class="btn-secondary"
        >
          <svg id="copyIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <span id="copyText">复制验证码</span>
        </button>
      </div>

      <footer class="page-footer fade-up delay-2">
        <p>
          验证码每 30 秒自动刷新 · 页面刷新后数据将清除
        </p>
      </footer>
    </div>
  </main>

  <script>
    // State
    let currentSecret = '';
    let currentCode = '';
    let timerInterval = null;
    let isDarkMode = true; // 默认深色模式

    // DOM Elements
    const secretInput = document.getElementById('secretInput');
    const toggleVisibility = document.getElementById('toggleVisibility');
    const eyeIcon = document.getElementById('eyeIcon');
    const generateBtn = document.getElementById('generateBtn');
    const secretError = document.getElementById('secretError');
    const codeCard = document.getElementById('codeCard');
    const codeDisplay = document.getElementById('codeDisplay');
    const timerText = document.getElementById('timerText');
    const progressCircle = document.getElementById('progressCircle');
    const copyBtn = document.getElementById('copyBtn');
    const copyIcon = document.getElementById('copyIcon');
    const copyText = document.getElementById('copyText');
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const copyCodeText = document.getElementById('copyCodeText');
    const copyToast = document.getElementById('copyToast');
    const toastText = document.getElementById('toastText');

    // 初始化主题
    function initTheme() {
      // 检查本地存储
      const savedTheme = localStorage.getItem('2fa-theme');
      if (savedTheme === 'light') {
        enableLightMode();
      } else {
        enableDarkMode();
      }
    }

    // 启用深色模式
    function enableDarkMode() {
      document.body.classList.remove('light-mode');
      isDarkMode = true;
      themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>';
      localStorage.setItem('2fa-theme', 'dark');
    }

    // 启用浅色模式
    function enableLightMode() {
      document.body.classList.add('light-mode');
      isDarkMode = false;
      themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>';
      localStorage.setItem('2fa-theme', 'light');
    }

    // 切换主题
    function toggleTheme() {
      if (isDarkMode) {
        enableLightMode();
      } else {
        enableDarkMode();
      }
    }

    // 显示复制提示
    function showToast(text, isSuccess = true) {
      toastText.textContent = text;
      copyToast.classList.add('show');
      if (!isSuccess) {
        copyToast.style.color = 'var(--danger)';
        copyToast.querySelector('svg').style.color = 'var(--danger)';
      } else {
        copyToast.style.color = 'var(--fg)';
        copyToast.querySelector('svg').style.color = 'var(--accent)';
      }
      setTimeout(() => {
        copyToast.classList.remove('show');
      }, 2000);
    }

    // Base32 decode
    function base32Decode(str) {
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
      const cleanStr = str.toUpperCase().replace(/[^A-Z2-7]/g, '');
      
      if (cleanStr.length === 0) return null;
      
      let bits = '';
      for (let i = 0; i < cleanStr.length; i++) {
        const val = alphabet.indexOf(cleanStr[i]);
        if (val === -1) return null;
        bits += val.toString(2).padStart(5, '0');
      }
      
      const bytes = [];
      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.substr(i, 8), 2));
      }
      
      return new Uint8Array(bytes);
    }

    // HMAC-SHA1
    async function hmacSha1(key, message) {
      const cryptoKey = await crypto.subtle.importKey(
        'raw',
        key,
        { name: 'HMAC', hash: 'SHA-1' },
        false,
        ['sign']
      );
      
      const signature = await crypto.subtle.sign('HMAC', cryptoKey, message);
      return new Uint8Array(signature);
    }

    // Generate TOTP
    async function generateTOTP(secret) {
      const key = base32Decode(secret);
      if (!key) {
        throw new Error('Invalid secret key');
      }
      
      const time = Math.floor(Date.now() / 1000 / 30);
      const timeBuffer = new ArrayBuffer(8);
      const timeView = new DataView(timeBuffer);
      timeView.setUint32(4, time, false);
      
      const hmac = await hmacSha1(key, new Uint8Array(timeBuffer));
      
      const offset = hmac[hmac.length - 1] & 0x0f;
      const code = (
        ((hmac[offset] & 0x7f) << 24) |
        ((hmac[offset + 1] & 0xff) << 16) |
        ((hmac[offset + 2] & 0xff) << 8) |
        (hmac[offset + 3] & 0xff)
      ) % 1000000;
      
      return code.toString().padStart(6, '0');
    }

    // Format code with space
    function formatCode(code) {
      // 同步更新隐藏的复制文本（无空格，纯数字）
      copyCodeText.textContent = code;
      return code.substr(0, 3) + ' ' + code.substr(3);
    }

    // Update timer display
    function updateTimer() {
      const now = Date.now();
      const secondsRemaining = 30 - (Math.floor(now / 1000) % 30);
      const progress = secondsRemaining / 30;
      
      timerText.textContent = secondsRemaining + 's';
      
      const circumference = 94.247;
      const offset = circumference * (1 - progress);
      progressCircle.style.strokeDashoffset = offset;
      
      if (secondsRemaining <= 5) {
        progressCircle.classList.add('timer-pulse');
        progressCircle.style.stroke = 'var(--danger)';
        timerText.style.color = 'var(--danger)';
      } else {
        progressCircle.classList.remove('timer-pulse');
        progressCircle.style.stroke = 'var(--accent)';
        timerText.style.color = 'var(--accent)';
      }
      
      if (secondsRemaining === 30) {
        refreshCode();
      }
    }

    // Refresh code
    async function refreshCode() {
      if (!currentSecret) return;
      
      try {
        currentCode = await generateTOTP(currentSecret);
        codeDisplay.textContent = formatCode(currentCode);
      } catch (error) {
        console.error('Error refreshing code:', error);
      }
    }

    // Start generating
    async function startGenerating() {
      const secret = secretInput.value.trim().toUpperCase();
      
      if (!secret) {
        secretError.textContent = '请输入密钥';
        secretError.classList.remove('hidden');
        return;
      }
      
      try {
        currentCode = await generateTOTP(secret);
        currentSecret = secret;
        
        codeCard.classList.remove('hidden');
        secretError.classList.add('hidden');
        
        codeDisplay.textContent = formatCode(currentCode);
        
        if (timerInterval) clearInterval(timerInterval);
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
        
      } catch (error) {
        secretError.textContent = '密钥格式无效，请检查后重试';
        secretError.classList.remove('hidden');
        codeCard.classList.add('hidden');
      }
    }

    // 修复版复制验证码 - 双方案兼容
    async function copyCode() {
      if (!currentCode || currentCode === '000000') {
        showToast('暂无验证码可复制', false);
        return;
      }

      try {
        // 方案1：优先使用剪贴板API（主流浏览器）
        await navigator.clipboard.writeText(currentCode);
        copySuccessHandle();
      } catch (err) {
        // 方案2：降级使用创建临时文本框复制（兼容低版本/无HTTPS环境）
        const tempInput = document.createElement('input');
        tempInput.value = currentCode;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand('copy');
        document.body.removeChild(tempInput);
        copySuccessHandle();
      }
    }

    // 复制成功统一处理
    function copySuccessHandle() {
      copyBtn.classList.add('copy-success');
      copyText.textContent = '已复制 ✓';
      copyIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>';
      showToast('验证码已复制到剪贴板');
      
      setTimeout(() => {
        copyText.textContent = '复制验证码';
        copyIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>';
        copyBtn.classList.remove('copy-success');
      }, 1500);
    }

    // Event listeners
    generateBtn.addEventListener('click', startGenerating);
    
    secretInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        startGenerating();
      }
    });
    
    copyBtn.addEventListener('click', copyCode);
    
    let isVisible = true;
    toggleVisibility.addEventListener('click', () => {
      isVisible = !isVisible;
      secretInput.type = isVisible ? 'text' : 'password';
      eyeIcon.innerHTML = isVisible 
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>';
    });

    secretInput.addEventListener('input', () => {
      secretError.classList.add('hidden');
    });

    // 主题切换事件
    themeToggle.addEventListener('click', toggleTheme);

    // 初始化
    document.addEventListener('DOMContentLoaded', initTheme);
  </script>
</body>
</html>
